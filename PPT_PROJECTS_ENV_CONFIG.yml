# =============================================================================
# ADQVEST — MASTER CONFIGURATION FILE
# =============================================================================
# STRUCTURE:
#   - "db"            block  →  Common database connections (same for ALL projects)
#   - "python"        block  →  Python exe + default module path
#   - "projects"      block  →  Per-project PPT template, output dirs, functions
#
# HOW TO SWITCH ENVIRONMENT:
#   Local  :  Sys.setenv(R_CONFIG_ACTIVE = "local_santonu")
#   Server :  System Env Variable  R_CONFIG_ACTIVE = default  (or leave unset)
#             Control Panel → System → Advanced → Environment Variables → New
#             Variable Name : R_CONFIG_ACTIVE  |  Variable Value : default
#
# PROJECTS COVERED:
#   Windows_3 Server  →  NIIF_GRIX | PREMJI_CPI | AZIM_PREMJI_WEEKLY | LIGHT_HOUSE
#   Windows_Main      →  AMBIT_MONTHLY_HFI | AMBIT_UTILITIES_SECTOR
#
# NOTE ON python_module:
#   If a project sets its own "python_module", that overrides the env-level default.
#   AMBIT projects (Windows_Main) use get_data_from_thurro_api.py — set per project.
# =============================================================================


# -----------------------------------------------------------------------
# DEFAULT  →  Windows Server (Administrator)  [PRODUCTION]
# -----------------------------------------------------------------------
default:
  # ------------------------------------------------------------------
  # PROJECTS — per-project PPT template, output dirs, functions
  # ------------------------------------------------------------------
  projects:

    # ----------------------------------------------------------------
    # NIIF GRIX  (Windows_3 Server)
    # Script: A003_NIIF_MONTHLY_GRIX_PPT_AI_GENERATED_DESCRIPTION_V1.R
    # ----------------------------------------------------------------
    NIIF_GRIX_PPT:
      ppt_template:  "E:/R_PPT/PPTGENERATION/template.pptx"
      ai_title_dir:  "E:/R_PPT/PPTGENERATION/NIIF_MONTHLY_GRIX_REPORT_WIDGETS_AI_DESCRIPTION_WITH_AI_SUMMARY_V1.xlsx"
      slides_config: "E:/R_PPT/PPTGENERATION/NIIF_MONTHLY_PPT_SLIDE_CONFIG_TEMPLATE.xlsx"
      ai_slide_config: "E:/R_PPT/PPTGENERATION/NIIF_MONTHLY_PPT_SLIDE_CONFIG.xlsx"
      ppt_output:    "E:/R_PPT/PPTGENERATION/NIIF_GRIX_PPT_OUTPUT/NIIF_GRIX_PPT.pptx"
      ppt_dir:       "E:/R_PPT/PPTGENERATION"
      proj_font:     "C:/Windows/Fonts/calibril.ttf"
      # ── Debug: save chart data to Excel for inspection ────────────────
      debug_chart_data:      True
      debug_chart_data_path: "E:/R_PPT/PPTGENERATION/debug_chart_data.xlsx"

      chart_theme:
            # ── Grid ─────────────────────────────────────────────────
            grid_show: true
            grid_color: "#BDBDBD"
            grid_alpha: 0.5
            grid_width: 0.5
            # ── Y-axis number format ──────────────────────────────────
            y_fmt: "parens"          # plain | comma | percent | parens
            y2_fmt: "parens"
            y_show_labels: true
            y2_show_labels: true
            tick_color: "#000000"
            # ── Y-axis rotated unit labels ────────────────────────────
            # Set "" here for global default; override per chart via y1_label in Excel.
            y_axis_label: ""
            y_axis_label_size: 10
            y2_axis_label: ""
            y2_axis_label_size: 10
            # ── Series colours ────────────────────────────────────────
            bar_color: "#4472C4"
            line_colors: ["#4472C4", "#9C1C2C", "#C45050", "#6BA85F"]
            line_width: 0.8         # R/ggplot2 default is ~0.5mm ≈ 0.8–1.0pt at display size
            line_style: "-"         # "-" | "--" | ":"
            line_styles: ["-"]         # per-series override e.g. ["-", "--"]
            # ── Markers ───────────────────────────────────────────────
            markers: false
            marker_size: 5.5
            marker_shapes: ["s", "o", "^", "D"]
            # ── Annotations ───────────────────────────────────────────
            data_lbl_size: 8
            data_lbl_bold: true
            data_lbl_color: "#1a1a1a"
            data_lbl_decimals: 1
            data_lbl_color_match_series: false  # label colour = series colour
            show_values_all:    false        # true = label EVERY data point on all chart types
            show_values_latest: true         # true = label LATEST point only (default; show_values_all overrides)
            annot_avoid_xaxis: false         # prevent end-of-series labels from overlapping x-axis
            # ── Legend ────────────────────────────────────────────────
            legend_loc: "top"       # top | right | none
            legend_fontsize: 10
            legend_offset: -0.08          # gap between chart top and legend (fraction of axes height)
            legend_width: 0.4            # swatch length in font-size units
            legend_label_n_tax_gap: 0.5   # gap between swatch and label text
            legend_height: 0.4            # swatch vertical height in font-size units
            legend_linewidth: 0.0         # line swatch thickness (pts); 0 = same as line_width
            # ── Background ────────────────────────────────────────────
            transparent: false
            # ── Typography & axes ─────────────────────────────────────
            font_family: "Calibri"
            font_weight: "light"
            tick_label_size: 8
            show_x_axis: true
            show_y_axis: false
            show_y2_axis: false      # right y-axis spine for dual-axis charts
            # false = x-axis line at y=0 | true = x-axis line at y_min (bottom of chart)
            x_axis_at_data_min: true
            axis_x_linewidth: 1.5
            axis_y_linewidth: 1
            axis_color: "#BDBDBD"   # spine lines and zero line colour
            # ── Tick mark lengths (0 = hidden) ────────────────────────
            x_tick_length: 4
            x_tick_width:  0.4
            y_tick_length: 0
            y2_tick_length: 0
            # ── X-label padding (gap between tick line and label, pts) ─
            x_tick_pad: 8
            # ── Tick label bold ───────────────────────────────────────
            x_tick_bold: false
            y_tick_bold: false
            y2_tick_bold: false
            # ── X-axis label angle ────────────────────────────────────
            x_tick_angle: 0           # -1 = auto (0° ≤9 labels, 45° >9 labels)
            # ── X-axis direction ──────────────────────────────────────
            x_axis_reverse: false       # false = oldest→newest | true = newest→oldest
            # ── X-axis label interval direction ──────────────────────
            x_label_from_latest: false  # false = count from oldest (oldest always labelled)
                                        # true  = count from latest (latest always labelled)
            # ── Dual-axis annotation gap ──────────────────────────────
            dual_annot_pad: 0.5        # fraction of x-range added as right padding (0.0 = off)
            # ── Bar width ─────────────────────────────────────────────
            bar_width: 0.0          # 0.0 = auto (computed from number of bars)



